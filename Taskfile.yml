version: '3'

# Release automation for kerf.
# Quick start:
#   task test                 # cargo test --workspace
#   task lint                 # fmt --check + clippy + deny
#   task build                # release binary at target/release/kerf
#   task release              # bump from commits, tag, push (CI builds binaries)
#   task release -- 0.2.0     # same, but pin the version
#
# See `task --list` for the pieces.
#
# The release task only bumps version + writes CHANGELOG + pushes a tag.
# The actual cross-platform binary builds and GitHub Release creation happen
# in .github/workflows/release.yml, which fires on the v* tag push.

vars:
  CARGO_TOML: Cargo.toml
  BIN_NAME: kerf

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list-all
    silent: true

  # ───── version ──────────────────────────────────────────────────────────

  version:
    desc: Print the current workspace version.
    cmds:
      - |
        grep -m1 -E '^version = ' {{.CARGO_TOML}} | sed -E 's/version = "([^"]+)"/\1/'
    silent: true

  bump:preview:
    desc: Print the next version that git-cliff would pick from recent commits.
    cmds:
      - |
        NEXT=$(git cliff --bumped-version 2>/dev/null | sed 's/^v//')
        CURRENT=$(grep -m1 -E '^version = ' {{.CARGO_TOML}} | sed -E 's/version = "([^"]+)"/\1/')
        echo "current:  $CURRENT"
        echo "next:     ${NEXT:-<none — no releasable commits since last tag>}"
    silent: true

  bump:
    desc: 'Bump workspace version (auto from commits) and Cargo.lock. Usage: task bump or task bump -- 0.2.0'
    vars:
      VERSION:
        sh: |
          if [ -n "{{.CLI_ARGS}}" ]; then
            printf '%s' "{{.CLI_ARGS}}"
          else
            git cliff --bumped-version 2>/dev/null | sed 's/^v//'
          fi
    preconditions:
      - sh: printf '%s' "{{.VERSION}}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'
        msg: 'Could not determine next version from commits. Pass one explicitly: task bump -- <semver>.'
    cmds:
      - |
        set -e
        # Bump [workspace.package].version — the only version field; member
        # crates inherit via version.workspace = true.
        sed -i '' -E 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"/version = "{{.VERSION}}"/' {{.CARGO_TOML}}
        # Refresh Cargo.lock so the bump is reflected before commit.
        cargo update --workspace --offline >/dev/null 2>&1 || cargo update --workspace
        echo "Bumped workspace version to {{.VERSION}}"

  # ───── changelog ────────────────────────────────────────────────────────

  changelog:
    desc: Regenerate CHANGELOG.md from git history.
    cmds:
      - git cliff -o CHANGELOG.md

  changelog:preview:
    desc: Preview what the next release section will look like.
    cmds:
      - git cliff --unreleased --strip all

  # ───── code quality ────────────────────────────────────────────────────

  fmt:
    desc: Format code with rustfmt.
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: Verify formatting without modifying files.
    cmds:
      - cargo fmt --all -- --check

  clippy:
    desc: Run clippy with warnings as errors (all features, so every backend is linted).
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    desc: 'Unit + offline tests across the workspace (no network, no emulators).'
    cmds:
      # All crypto, format, envelope, MAC, and KMS request-shape tests run
      # here. KMS integration tests skip themselves unless their KERF_KMS_
      # ENDPOINT_* env var is set, so this is safe to run anywhere — CI too.
      - cargo test --workspace --all-features

  test:core:
    desc: Fast core-only tests, optimized.
    cmds:
      - cargo test -p kerf-core --release

  test:integration:
    desc: 'Batteries-included: spin up KMS emulators, run end-to-end tests, tear down.'
    # Endpoint + credential env vars are set for the whole task, so the
    # cargo test subprocess sees them and the #[ignore]d tests actually run.
    env:
      KERF_KMS_ENDPOINT_AWS: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      KERF_KMS_ENDPOINT_GCP: localhost:9010
    cmds:
      - task: infra:up
      # `defer` runs at task end in LIFO order — registered right after up so
      # the emulators are torn down even if the wait or the tests fail.
      - defer: { task: infra:down }
      - task: infra:wait
      # Real wire format, no mocks (per CLAUDE.md). --ignored runs ONLY the
      # emulator-gated tests; each self-provisions its own KMS key (AWS via
      # kms:CreateKey, GCP via CreateKeyRing/CreateCryptoKey).
      - cargo test --workspace --all-features -- --ignored

  test:integration:manual:
    desc: 'Run integration tests against already-running infra (no up/down). Set env yourself.'
    cmds:
      - cargo test --workspace --all-features -- --ignored
    preconditions:
      - sh: 'test -n "$KERF_KMS_ENDPOINT_AWS$KERF_KMS_ENDPOINT_GCP$KERF_KMS_ENDPOINT_AZURE"'
        msg: |
          No KMS emulator endpoint configured. Either run `task test:integration`
          (which manages the emulators for you), or start them yourself and
          `eval "$(task infra:env)"` before re-running this.

  # ───── test infra (local KMS emulators) ─────────────────────────────────
  #
  # `task test:integration` drives these automatically. They're also exposed
  # individually for manual / persistent-infra workflows.

  infra:up:
    desc: 'Start local KMS emulators (AWS, GCP) in docker.'
    preconditions:
      - sh: command -v docker >/dev/null
        msg: 'docker not found. Install Docker to run the KMS emulators.'
    cmds:
      - docker compose -f docker-compose.test.yml up -d

  infra:down:
    desc: 'Stop and remove the local KMS emulators (and their volumes).'
    cmds:
      - docker compose -f docker-compose.test.yml down -v

  infra:status:
    desc: 'Show the running emulator containers.'
    cmds:
      - docker compose -f docker-compose.test.yml ps

  infra:wait:
    desc: 'Block until the emulators are accepting connections (≤60s).'
    cmds:
      - |
        set -e
        echo "Waiting for AWS KMS emulator (:4566)…"
        for i in $(seq 1 30); do
          if curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1; then break; fi
          [ "$i" = 30 ] && { echo "AWS emulator did not become ready"; exit 1; }
          sleep 2
        done
        echo "Waiting for GCP KMS emulator (:9010)…"
        for i in $(seq 1 30); do
          if (exec 3<>/dev/tcp/localhost/9010) 2>/dev/null; then exec 3>&- 3<&-; break; fi
          [ "$i" = 30 ] && { echo "GCP emulator did not become ready"; exit 1; }
          sleep 2
        done
        echo "Emulators ready."

  infra:env:
    desc: 'Print integration-test env vars. Use: eval "$(task infra:env)"'
    silent: true
    cmds:
      - |
        echo 'export KERF_KMS_ENDPOINT_AWS=http://localhost:4566'
        echo 'export AWS_ACCESS_KEY_ID=test'
        echo 'export AWS_SECRET_ACCESS_KEY=test'
        echo 'export AWS_REGION=us-east-1'
        echo 'export KERF_KMS_ENDPOINT_GCP=localhost:9010'

  deny:
    desc: 'Supply-chain audit (cargo-deny: advisories, licenses, bans, sources).'
    cmds:
      - cargo deny check

  lint:
    desc: Format check + clippy + cargo-deny.
    cmds:
      - task: fmt:check
      - task: clippy
      - task: deny

  # ───── build ────────────────────────────────────────────────────────────

  build:
    desc: 'Build a release binary. Output at target/release/{{.BIN_NAME}}.'
    cmds:
      - cargo build --release -p kerf-cli

  clean:
    desc: Remove cargo target directory.
    cmds:
      - cargo clean

  # ───── fuzz ────────────────────────────────────────────────────────────

  fuzz:
    desc: 'Run a fuzz target for 5 minutes. Usage: task fuzz -- envelope_parser'
    preconditions:
      - sh: command -v cargo-fuzz >/dev/null
        msg: 'cargo-fuzz not installed. Run `cargo install cargo-fuzz`.'
      - sh: test -n "{{.CLI_ARGS}}"
        msg: 'Usage: task fuzz -- <target>'
    cmds:
      - cargo fuzz run {{.CLI_ARGS}} -- -max_total_time=300

  # ───── docs ────────────────────────────────────────────────────────────

  docs:install:
    desc: 'Install docs site dependencies (one-time).'
    dir: docs
    status:
      - test -d node_modules
    cmds:
      - npm install

  docs:dev:
    desc: 'Run the docs site locally at http://localhost:4321/kerf/.'
    deps: [docs:install]
    dir: docs
    cmds:
      - npm run dev

  docs:build:
    desc: 'Build the static docs site into docs/dist.'
    deps: [docs:install]
    dir: docs
    cmds:
      - npm run build

  docs:preview:
    desc: 'Serve the built docs site locally for a final check.'
    deps: [docs:build]
    dir: docs
    cmds:
      - npm run preview

  # ───── release ──────────────────────────────────────────────────────────

  release:
    desc: 'Bump version, regenerate CHANGELOG, commit, tag, and push. CI builds the binaries.'
    vars:
      VERSION:
        sh: |
          if [ -n "{{.CLI_ARGS}}" ]; then
            printf '%s' "{{.CLI_ARGS}}"
          else
            git cliff --bumped-version 2>/dev/null | sed 's/^v//'
          fi
    preconditions:
      - sh: printf '%s' "{{.VERSION}}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'
        msg: 'Could not determine next version.'
      - sh: test -z "$(git status --porcelain)"
        msg: 'Working tree not clean. Commit or stash first.'
      - sh: test "$(git rev-parse --abbrev-ref HEAD)" = 'main'
        msg: 'Must be on main branch.'
      - sh: |
          git fetch --quiet origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
        msg: 'Local main is out of sync with origin/main.'
      - sh: '! git rev-parse v{{.VERSION}} >/dev/null 2>&1'
        msg: 'Tag v{{.VERSION}} already exists.'
      - sh: gh auth status >/dev/null 2>&1
        msg: 'Run `gh auth login` first.'
    cmds:
      - task: lint
      - task: test
      - task: bump
        vars: { CLI_ARGS: '{{.VERSION}}' }
      - git cliff --tag v{{.VERSION}} -o CHANGELOG.md
      - git add {{.CARGO_TOML}} Cargo.lock CHANGELOG.md
      - 'git commit -m "chore(release): v{{.VERSION}}"'
      - git tag -a v{{.VERSION}} -m "v{{.VERSION}}"
      - git push origin main
      - git push origin v{{.VERSION}}
      - echo "Pushed tag v{{.VERSION}}. CI will build binaries and publish the GitHub Release."

  release:notes:
    desc: 'Rebuild the GH release notes for an existing tag.'
    vars:
      VERSION: '{{.CLI_ARGS}}'
    preconditions:
      - sh: printf '%s' "{{.VERSION}}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'
        msg: 'Usage: task release:notes -- <semver>'
      - sh: git rev-parse v{{.VERSION}} >/dev/null 2>&1
        msg: 'Tag v{{.VERSION}} not found.'
    cmds:
      - |
        NOTES=$(git cliff --current --strip all)
        gh release edit v{{.VERSION}} --notes "$NOTES" 2>/dev/null \
          || gh release create v{{.VERSION}} --title "v{{.VERSION}}" --notes "$NOTES"
