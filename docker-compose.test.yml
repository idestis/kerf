# Local KMS emulators for `task test:integration`.
#
# Brought up/down via `task infra:up` / `task infra:down`. None of these are
# needed for `task test` (the default suite is fully offline) — they exist
# only so maintainers can exercise the real KMS wire format locally without
# touching a cloud account.
#
# Ports match the KERF_KMS_ENDPOINT_* values printed by `task infra:env`.

services:
  # ─── AWS KMS ────────────────────────────────────────────────────────────
  # floci is a free (MIT), no-auth-token AWS emulator and a drop-in for
  # LocalStack on port 4566. We use it rather than LocalStack because recent
  # LocalStack releases gate KMS behind a paid license/auth token. The
  # `-compat` image maximizes AWS-SDK wire compatibility, which is what our
  # aws-sdk-kms client needs. The AWS integration test self-provisions its key
  # via kms:CreateKey, so no manual key setup is needed here.
  aws-kms:
    image: floci/floci:latest-compat
    ports:
      - "4566:4566"

  # ─── GCP Cloud KMS ──────────────────────────────────────────────────────
  # floci-gcp does NOT implement Cloud KMS, so we use fake-cloud-kms. It speaks
  # the Cloud KMS gRPC API and listens on 9010 by default (no flags needed).
  # The GCP integration test expects KERF_GCP_TEST_KEY to exist; provision it
  # with `task infra:keys` after the container is up (CreateCryptoKey
  # auto-creates version 1).
  gcp-kms:
    # Pinned to a stable release tag rather than :latest — reproducible, and
    # avoids the moving-tag manifest hiccups Docker Hub sometimes throws on
    # anonymous pulls.
    image: winor30/fake-cloud-kms:v0.0.1
    # This image is published amd64-only; on Apple Silicon / arm64 hosts Docker
    # needs to be told to pull the amd64 variant and run it under emulation
    # (Rosetta / qemu). Harmless on amd64 hosts.
    platform: linux/amd64
    ports:
      - "9010:9010"

  # ─── Azure Key Vault ────────────────────────────────────────────────────
  # Enabled once the Azure backend lands. lowkey-vault is the emulator; floci-az
  # is the alternative on :4577. Left commented so `infra:up` doesn't pull an
  # image the test suite can't use yet.
  #
  # azure-kv:
  #   image: nagyesta/lowkey-vault:latest
  #   ports:
  #     - "4577:8443"
