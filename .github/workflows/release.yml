name: Release

# Fires when `task release` pushes a v* tag. Builds the kerf binary for the
# five target triples listed in SPEC § 10, packages each, computes
# SHA-256 checksums, and creates the GitHub Release with git-cliff notes.
#
# Attaches signed/checksummed archives to the GitHub Release, then renders
# a Homebrew formula from those archives and pushes it to the tap repo
# (idestis/homebrew-kerf) using the cross-repo HOMEBREW_TAP_TOKEN secret.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build, e.g. v0.1.0'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: kerf

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation toolchain (linux aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        shell: bash
        # --all-features so the delivered binary supports every recipient
        # backend (age, AWS, GCP, Azure), not just the default aws-kms.
        run: cargo build --release --locked --all-features --target ${{ matrix.target }} -p kerf-cli

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          NAME="${BIN_NAME}-v${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "dist/${NAME}/"
            cp README.md LICENSE "dist/${NAME}/"
            (cd dist && 7z a "${NAME}.zip" "${NAME}" >/dev/null)
            ARTIFACT="dist/${NAME}.zip"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${NAME}/"
            cp README.md LICENSE "dist/${NAME}/"
            (cd dist && tar -czf "${NAME}.tar.gz" "${NAME}")
            ARTIFACT="dist/${NAME}.tar.gz"
          fi

          # SHA-256 checksum
          if command -v sha256sum >/dev/null; then
            (cd dist && sha256sum "$(basename "$ARTIFACT")" > "$(basename "$ARTIFACT").sha256")
          else
            (cd dist && shasum -a 256 "$(basename "$ARTIFACT")" > "$(basename "$ARTIFACT").sha256")
          fi

          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "checksum=${ARTIFACT}.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: kerf-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.artifact }}
            ${{ steps.pkg.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes (git-cliff)
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Aggregate checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "${{ steps.notes.outputs.changelog || 'RELEASE_NOTES.md' }}" \
            dist/*.tar.gz dist/*.zip dist/*.sha256 dist/SHA256SUMS

  homebrew:
    name: publish Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        run: (cd dist && cat *.sha256 > SHA256SUMS)

      - name: Check out the tap repo
        uses: actions/checkout@v4
        with:
          repository: idestis/homebrew-kerf
          # Cross-repo write: GITHUB_TOKEN can't reach another repo, so use a
          # fine-grained PAT scoped to homebrew-kerf (Contents: read/write).
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render Formula/kerf.rb
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Pull the per-target sha256 out of the aggregated SHA256SUMS.
          sha() { awk -v f="kerf-v${VERSION}-$1.tar.gz" '$2==f {print $1}' dist/SHA256SUMS; }

          for t in aarch64-apple-darwin x86_64-apple-darwin \
                   aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            [ -n "$(sha "$t")" ] || { echo "::error::missing sha256 for $t"; exit 1; }
          done

          mkdir -p tap/Formula
          cat > tap/Formula/kerf.rb <<EOF
          class Kerf < Formula
            desc "Diff-aware, KMS-first encryption for structured secret files"
            homepage "https://github.com/idestis/kerf"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "${URL_BASE}/kerf-v${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "$(sha aarch64-apple-darwin)"
              end
              on_intel do
                url "${URL_BASE}/kerf-v${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "$(sha x86_64-apple-darwin)"
              end
            end

            on_linux do
              on_arm do
                url "${URL_BASE}/kerf-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "$(sha aarch64-unknown-linux-gnu)"
              end
              on_intel do
                url "${URL_BASE}/kerf-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$(sha x86_64-unknown-linux-gnu)"
              end
            end

            def install
              bin.install "kerf"
            end

            test do
              assert_match "kerf #{version}", shell_output("#{bin}/kerf --version")
            end
          end
          EOF

          echo "::group::rendered formula"
          cat tap/Formula/kerf.rb
          echo "::endgroup::"

      - name: Commit and push to the tap
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          cd tap
          git config user.name  "kerf-release-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kerf.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${TAG}; nothing to push."
            exit 0
          fi
          git commit -m "kerf ${TAG}"
          git push
